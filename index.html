<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aydın Mühendislik | DSM Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center pt-10">

    <nav class="w-full max-w-5xl px-6 flex justify-between items-center mb-12">
        <h1 class="text-2xl font-extrabold tracking-tighter text-white">AYDIN <span class="text-neutral-500">MÜHENDİSLİK</span></h1>
        <button id="loginBtn" class="text-sm font-semibold text-neutral-400 hover:text-white transition-colors" onclick="toggleLoginModal()">
            Admin Girişi
        </button>
    </nav>

    <main class="w-full max-w-5xl px-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="glass-card p-6 rounded-2xl flex flex-col justify-center">
            <span class="text-neutral-400 text-sm font-medium mb-1">Toplam Metraj</span>
            <span class="text-4xl font-bold text-white">1,221 <span class="text-lg text-neutral-500">m</span></span>
        </div>
        <div class="glass-card p-6 rounded-2xl flex flex-col justify-center">
            <span class="text-neutral-400 text-sm font-medium mb-1">Toplam Çimento</span>
            <span class="text-4xl font-bold text-white">450 <span class="text-lg text-neutral-500">ton</span></span>
        </div>
        <div class="glass-card p-6 rounded-2xl flex flex-col justify-center">
            <span class="text-neutral-400 text-sm font-medium mb-1">Aktif Kuyu Sayısı</span>
            <span class="text-4xl font-bold text-white">154</span>
        </div>

        <div class="glass-card p-6 rounded-2xl md:col-span-3 mt-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold text-white">Son Çalışmalar</h2>
                <button id="addBtn" class="hidden bg-white text-black px-4 py-2 rounded-full text-sm font-bold hover:bg-neutral-200 transition-all shadow-lg">
                    + Yeni Veri Ekle
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-neutral-400">
                    <thead class="text-xs uppercase bg-neutral-900/50 text-neutral-500">
                        <tr>
                            <th class="px-4 py-3 rounded-l-lg">Tarih</th>
                            <th class="px-4 py-3">Proje / Firma</th>
                            <th class="px-4 py-3">Kuyu No</th>
                            <th class="px-4 py-3 rounded-r-lg text-right">Metraj</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-neutral-800 hover:bg-neutral-800/50 transition-colors">
                            <td class="px-4 py-4 text-white">15.01.2026</td>
                            <td class="px-4 py-4">Demirtürk İnşaat</td>
                            <td class="px-4 py-4">A-12</td>
                            <td class="px-4 py-4 text-right font-medium text-white">18.5 m</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex justify-center items-center z-50">
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm">
            <h3 class="text-xl font-bold text-white mb-6">Yönetici Girişi</h3>
            <input type="password" id="adminPassword" placeholder="Şifrenizi girin" class="w-full bg-neutral-900 border border-neutral-700 rounded-xl px-4 py-3 mb-4 text-white focus:outline-none focus:border-white transition-colors">
            <div class="flex gap-3">
                <button onclick="toggleLoginModal()" class="w-1/3 py-3 rounded-xl text-neutral-400 font-semibold hover:text-white transition-colors">İptal</button>
                <button onclick="login()" class="w-2/3 bg-white text-black py-3 rounded-xl font-bold hover:bg-neutral-200 transition-colors shadow-lg">Giriş Yap</button>
            </div>
        </div>
    </div>

    <script>
        function toggleLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.toggle('hidden');
        }

        // Bu kısım ileride Firebase'e bağlanacak
        function login() {
            const pass = document.getElementById('adminPassword').value;
            if(pass === "sifre123") { // Geçici basit şifre kontrolü
                document.getElementById('addBtn').classList.remove('hidden');
                document.getElementById('loginBtn').innerText = "Çıkış Yap";
                document.getElementById('loginBtn').setAttribute('onclick', 'logout()');
                toggleLoginModal();
            } else {
                alert("Hatalı Şifre!");
            }
        }

        function logout() {
            document.getElementById('addBtn').classList.add('hidden');
            document.getElementById('loginBtn').innerText = "Admin Girişi";
            document.getElementById('loginBtn').setAttribute('onclick', 'toggleLoginModal()');
        }
    </script>
</body>
</html>
